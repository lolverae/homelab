apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  driftDetection:
    mode: enabled
  interval: 1h
  chart:
    spec:
      chart: grafana
      version: 10.5.14
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
    securityContext:
      runAsUser: 472
      runAsGroup: 472
      fsGroup: 472
    initChownData:
      enabled: false
    persistence:
      enabled: true
      accessModes:
        - ReadWriteOnce
      size: 512Mi
    ingress:
      enabled: false
