apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-cert
  namespace: monitoring
spec:
  secretName: grafana-cert
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - grafana.totorolab.local
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nextcloud-cert
  namespace: nextcloud
spec:
  secretName: nextcloud-cert
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - nextcloud.totorolab.local
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-cert
  namespace: traefik
spec:
  secretName: traefik-cert
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - totorolab.local
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homarr-cert
  namespace: homarr
spec:
  secretName: homarr-cert
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - homarr.totorolab.local
