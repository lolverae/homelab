apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: totorolab-ca
  namespace: cert-manager
spec:
  isCA: true
  secretName: totorolab-ca
  commonName: totorolab-ca
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: totorolab-ca
spec:
  ca:
    secretName: totorolab-ca
