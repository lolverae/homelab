apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homarr
  namespace: homarr
spec:
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: homarr
      sourceRef:
        kind: HelmRepository
        name: homarr
        namespace: homarr
      version: 8.19.0
  interval: 1h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    image:
      repository: ghcr.io/homarr-labs/homarr
      pullPolicy: IfNotPresent
      tag: v1.63.0
    podSecurityContext:
      fsGroup: 1000
    env:
      TZ: America/CST
    imagePullSecrets:
      - name: regcred
    persistence:
      data:
        enabled: true
        accessMode: ReadWriteOnce
        size: 2Gi
        mountPath: /appdata
      nginx-conf:
        enabled: true
        type: emptyDir
        mountPath: /etc/nginx
      nginx-tmp:
        enabled: true
        type: emptyDir
        mountPath: /var/lib/nginx
    livenessProbe:
      httpGet:
        path: /
        port: 7575
    readinessProbe:
      httpGet:
        path: /
        port: 7575
    service:
      enabled: true
      type: ClusterIP
      ports:
        app:
          port: 7575
          targetPort: http
          protocol: TCP
