apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-traefik-prefix
  namespace: traefik
spec:
  stripPrefix:
    prefixes:
      - /traefik
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dashboard
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`totorolab.local`) && PathPrefix(`/traefik`)
      kind: Rule
      middlewares:
        - name: strip-traefik-prefix
      services:
        - name: api@internal
          kind: TraefikService
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nextcloud.totorolab.local`)
      kind: Rule
      services:
        - name: nextcloud
          port: 80
  tls:
    secretName: nextcloud-cert
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.totorolab.local`)
      kind: Rule
      services:
        - name: grafana
          port: 80
  tls:
    secretName: grafana-cert
