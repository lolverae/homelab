apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  driftDetection:
    mode: enabled
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.9.3
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: immich
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    immich:
      persistence:
        library:
          existingClaim: immich-library

    server:
      enabled: true
      image:
        repository: ghcr.io/immich-app/immich-server
        pullPolicy: IfNotPresent
      env:
        TZ: America/Chicago
      service:
        type: ClusterIP
        port: 2283

    machine-learning:
      enabled: true
      image:
        repository: ghcr.io/immich-app/immich-machine-learning
        pullPolicy: IfNotPresent
      env:
        TZ: America/Chicago
      persistence:
        cache:
          enabled: true
          size: 10Gi
          accessMode: ReadWriteOnce

    postgresql:
      enabled: true
      global:
        postgresql:
          auth:
            username: immich
            password: immich
            database: immich
      primary:
        persistence:
          enabled: true
          size: 8Gi
          accessModes:
            - ReadWriteOnce

    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
      master:
        persistence:
          enabled: true
          size: 1Gi
          accessModes:
            - ReadWriteOnce
